<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  <text x="200" y="28" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="16" font-weight="700">Offre et Demande</text>

  <!-- Axes -->
  <line x1="60" y1="250" x2="360" y2="250" stroke="#475569" stroke-width="1.5"/>
  <line x1="60" y1="250" x2="60" y2="50" stroke="#475569" stroke-width="1.5"/>
  <text x="200" y="270" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">Quantité</text>
  <text x="40" y="150" fill="#94a3b8" font-family="sans-serif" font-size="10" transform="rotate(-90 40 150)">Prix</text>

  <!-- Demand curve (descending) -->
  <path d="M80,80 Q180,150 340,230" stroke="#60a5fa" stroke-width="2.5" fill="none"/>
  <text x="340" y="220" fill="#60a5fa" font-family="sans-serif" font-size="11" font-weight="700">D</text>

  <!-- Supply curve (ascending) -->
  <path d="M80,230 Q180,150 340,80" stroke="#34d399" stroke-width="2.5" fill="none"/>
  <text x="340" y="75" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="700">O</text>

  <!-- Equilibrium point -->
  <circle cx="200" cy="155" r="6" fill="#fbbf24" stroke="#fbbf24" stroke-width="2"/>
  <text x="215" y="148" fill="#fbbf24" font-family="sans-serif" font-size="10" font-weight="700">Équilibre</text>

  <!-- Dotted lines to axes -->
  <line x1="60" y1="155" x2="200" y2="155" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4"/>
  <line x1="200" y1="155" x2="200" y2="250" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4"/>
  <text x="45" y="158" fill="#fbbf24" font-family="sans-serif" font-size="9" font-weight="700">P*</text>
  <text x="195" y="262" fill="#fbbf24" font-family="sans-serif" font-size="9" font-weight="700">Q*</text>

  <!-- Labels -->
  <rect x="20" y="278" width="360" height="16" rx="4" fill="rgba(96,165,250,0.06)"/>
  <text x="200" y="290" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">Prix monte → demande baisse | Prix monte → offre augmente</text>

  <!-- Legend -->
  <text x="80" y="50" fill="#60a5fa" font-family="sans-serif" font-size="9">📉 Demande : prix ↑ = achat ↓</text>
  <text x="80" y="65" fill="#34d399" font-family="sans-serif" font-size="9">📈 Offre : prix ↑ = production ↑</text>
  <text x="80" y="80" fill="#fbbf24" font-family="sans-serif" font-size="9">⚖️ Équilibre : offre = demande</text>
</svg>
