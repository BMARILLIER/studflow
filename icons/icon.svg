<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#141830"/>
    </linearGradient>
    <linearGradient id="s-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle glow behind the S -->
  <ellipse cx="256" cy="270" rx="140" ry="150" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Bold S letterform — custom path for a flowing, dynamic feel -->
  <path d="
    M 310 148
    C 310 148, 280 118, 232 118
    C 184 118, 148 148, 148 188
    C 148 228, 178 248, 220 262
    L 280 282
    C 322 296, 358 318, 358 362
    C 358 406, 322 440, 268 440
    C 214 440, 178 410, 168 390
  " fill="none" stroke="url(#s-grad)" stroke-width="42" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Top accent spark -->
  <circle cx="338" cy="120" r="6" fill="#fbbf24"/>
  <circle cx="356" cy="102" r="3.5" fill="#fbbf24" opacity="0.6"/>

  <!-- Bottom accent dot -->
  <circle cx="148" cy="418" r="5" fill="#34d399" opacity="0.6"/>

  <!-- Flow lines — subtle energy streaks -->
  <line x1="370" y1="200" x2="390" y2="185" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="380" y1="220" x2="405" y2="212" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
  <line x1="120" y1="340" x2="100" y2="350" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
</svg>
