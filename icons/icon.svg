<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#FF4D8D"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Book / graduation cap stylized as S -->
  <text x="256" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="280" font-weight="bold" fill="url(#accent)">S</text>
  <!-- Sparkle top right -->
  <circle cx="380" cy="130" r="8" fill="#FBBF24"/>
  <circle cx="400" cy="110" r="5" fill="#FBBF24" opacity="0.6"/>
  <!-- Small accent dot -->
  <circle cx="150" cy="380" r="6" fill="#34D399" opacity="0.7"/>
</svg>
