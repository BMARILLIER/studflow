<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  <text x="200" y="28" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="16" font-weight="700">Les 4 phases de la mitose</text>

  <!-- Prophase -->
  <circle cx="80" cy="120" r="40" stroke="#a78bfa" stroke-width="1.5" fill="rgba(167,139,250,0.05)"/>
  <text x="80" y="75" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="11" font-weight="700">Prophase</text>
  <line x1="65" y1="110" x2="95" y2="130" stroke="#fbbf24" stroke-width="2"/>
  <line x1="70" y1="130" x2="90" y2="110" stroke="#34d399" stroke-width="2"/>
  <text x="80" y="170" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="8">Chromosomes</text>
  <text x="80" y="180" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="8">visibles</text>

  <!-- Arrow -->
  <text x="135" y="122" fill="#475569" font-family="sans-serif" font-size="16">→</text>

  <!-- Metaphase -->
  <circle cx="190" cy="120" r="40" stroke="#60a5fa" stroke-width="1.5" fill="rgba(96,165,250,0.05)"/>
  <text x="190" y="75" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="11" font-weight="700">Métaphase</text>
  <line x1="180" y1="105" x2="180" y2="135" stroke="#fbbf24" stroke-width="2"/>
  <line x1="190" y1="105" x2="190" y2="135" stroke="#34d399" stroke-width="2"/>
  <line x1="200" y1="105" x2="200" y2="135" stroke="#fb923c" stroke-width="2"/>
  <line x1="170" y1="120" x2="210" y2="120" stroke="#475569" stroke-width="0.5" stroke-dasharray="3"/>
  <text x="190" y="170" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="8">Alignés au</text>
  <text x="190" y="180" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="8">milieu</text>

  <!-- Arrow -->
  <text x="245" y="122" fill="#475569" font-family="sans-serif" font-size="16">→</text>

  <!-- Anaphase -->
  <circle cx="300" cy="120" r="40" stroke="#34d399" stroke-width="1.5" fill="rgba(52,211,153,0.05)"/>
  <text x="300" y="75" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="700">Anaphase</text>
  <line x1="285" y1="105" x2="280" y2="95" stroke="#fbbf24" stroke-width="2"/>
  <line x1="290" y1="105" x2="287" y2="95" stroke="#34d399" stroke-width="2"/>
  <line x1="310" y1="135" x2="313" y2="145" stroke="#fbbf24" stroke-width="2"/>
  <line x1="315" y1="135" x2="320" y2="145" stroke="#34d399" stroke-width="2"/>
  <text x="300" y="170" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="8">Séparation</text>
  <text x="300" y="180" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="8">vers les pôles</text>

  <!-- Telophase below -->
  <text x="200" y="210" fill="#475569" font-family="sans-serif" font-size="14">↓</text>

  <!-- Telophase -->
  <ellipse cx="160" cy="245" rx="32" ry="28" stroke="#fb923c" stroke-width="1.5" fill="rgba(251,146,60,0.05)"/>
  <ellipse cx="240" cy="245" rx="32" ry="28" stroke="#fb923c" stroke-width="1.5" fill="rgba(251,146,60,0.05)"/>
  <text x="200" y="220" text-anchor="middle" fill="#fb923c" font-family="sans-serif" font-size="11" font-weight="700">Télophase</text>
  <circle cx="160" cy="245" r="10" stroke="#a78bfa" stroke-width="1" fill="rgba(167,139,250,0.1)"/>
  <circle cx="240" cy="245" r="10" stroke="#a78bfa" stroke-width="1" fill="rgba(167,139,250,0.1)"/>
  <text x="200" y="285" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="8">2 cellules identiques</text>

  <!-- PMAT -->
  <text x="200" y="295" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10" font-weight="600">PMAT = Pour Mieux Apprendre Tout</text>
</svg>
