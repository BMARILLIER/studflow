<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  <text x="200" y="28" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="16" font-weight="700">Séparation des pouvoirs</text>
  <text x="200" y="45" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="10">(Montesquieu)</text>

  <!-- Législatif -->
  <rect x="130" y="60" width="140" height="55" rx="14" fill="rgba(96,165,250,0.1)" stroke="#60a5fa" stroke-width="2"/>
  <text x="200" y="82" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="13" font-weight="700">Législatif</text>
  <text x="200" y="100" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">FAIRE les lois</text>
  <text x="200" y="112" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="8">Assemblée nationale + Sénat</text>

  <!-- Arrows -->
  <line x1="155" y1="115" x2="100" y2="155" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>
  <line x1="245" y1="115" x2="300" y2="155" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>

  <!-- Exécutif -->
  <rect x="20" y="155" width="140" height="55" rx="14" fill="rgba(251,146,60,0.1)" stroke="#fb923c" stroke-width="2"/>
  <text x="90" y="177" text-anchor="middle" fill="#fb923c" font-family="sans-serif" font-size="13" font-weight="700">Exécutif</text>
  <text x="90" y="195" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">APPLIQUER les lois</text>
  <text x="90" y="207" text-anchor="middle" fill="#fb923c" font-family="sans-serif" font-size="8">Président + Gouvernement</text>

  <!-- Judiciaire -->
  <rect x="240" y="155" width="140" height="55" rx="14" fill="rgba(167,139,250,0.1)" stroke="#a78bfa" stroke-width="2"/>
  <text x="310" y="177" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="13" font-weight="700">Judiciaire</text>
  <text x="310" y="195" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">JUGER les lois</text>
  <text x="310" y="207" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="8">Tribunaux + magistrats</text>

  <!-- Arrow between exec and jud -->
  <line x1="160" y1="182" x2="240" y2="182" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>

  <!-- Central message -->
  <text x="200" y="240" text-anchor="middle" fill="#fbbf24" font-family="sans-serif" font-size="11" font-weight="700">⚖️ "Le pouvoir arrête le pouvoir"</text>

  <!-- Bottom -->
  <rect x="30" y="258" width="340" height="34" rx="10" fill="rgba(239,68,68,0.06)" stroke="rgba(239,68,68,0.2)" stroke-width="1"/>
  <text x="200" y="272" text-anchor="middle" fill="#ef4444" font-family="sans-serif" font-size="9" font-weight="700">❌ Si 1 seule personne a les 3 pouvoirs = dictature</text>
  <text x="200" y="285" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="9" font-weight="700">✅ 3 pouvoirs séparés = liberté garantie</text>
</svg>
