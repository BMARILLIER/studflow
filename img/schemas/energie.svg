<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  <text x="200" y="28" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="16" font-weight="700">Énergie mécanique</text>

  <!-- Ball at top -->
  <circle cx="80" cy="80" r="18" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="2"/>
  <text x="80" y="84" text-anchor="middle" fill="#fb923c" font-family="sans-serif" font-size="10" font-weight="700">Ep max</text>
  <text x="80" y="110" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">Hauteur max</text>
  <text x="80" y="122" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">Vitesse = 0</text>

  <!-- Arrow down -->
  <path d="M100,90 Q200,160 200,200" stroke="#475569" stroke-width="1.5" stroke-dasharray="5" fill="none"/>
  <text x="160" y="140" fill="#475569" font-family="sans-serif" font-size="12">↓</text>

  <!-- Ball at middle -->
  <circle cx="200" cy="200" r="18" fill="rgba(96,165,250,0.3)" stroke="#60a5fa" stroke-width="2"/>
  <text x="200" y="196" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="9" font-weight="700">Ep + Ec</text>
  <text x="200" y="208" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="8">mélange</text>

  <!-- Arrow down -->
  <path d="M220,210 Q280,240 320,250" stroke="#475569" stroke-width="1.5" stroke-dasharray="5" fill="none"/>

  <!-- Ball at bottom -->
  <circle cx="320" cy="250" r="18" fill="rgba(52,211,153,0.3)" stroke="#34d399" stroke-width="2"/>
  <text x="320" y="254" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="10" font-weight="700">Ec max</text>
  <text x="320" y="220" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">Hauteur = 0</text>
  <text x="320" y="232" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">Vitesse max</text>

  <!-- Slope line -->
  <line x1="60" y1="98" x2="340" y2="268" stroke="#475569" stroke-width="2" opacity="0.3"/>

  <!-- Formula -->
  <rect x="20" y="280" width="360" height="16" rx="4" fill="rgba(96,165,250,0.08)"/>
  <text x="200" y="292" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="11" font-weight="700">Em = Ec + Ep = constante (si pas de frottement)</text>

  <!-- Legend -->
  <rect x="20" y="45" width="130" height="50" rx="8" fill="rgba(255,255,255,0.03)"/>
  <text x="30" y="60" fill="#fb923c" font-family="sans-serif" font-size="9">Ep = m × g × h</text>
  <text x="30" y="75" fill="#34d399" font-family="sans-serif" font-size="9">Ec = ½ × m × v²</text>
  <text x="30" y="90" fill="#60a5fa" font-family="sans-serif" font-size="9">Em = Ep + Ec</text>
</svg>
