<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  <text x="200" y="28" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="16" font-weight="700">Structure de l'ADN</text>

  <!-- Double helix backbone -->
  <path d="M120,50 Q200,90 280,50 Q200,130 120,90 Q200,170 280,130 Q200,210 120,170 Q200,250 280,210 Q200,290 120,250" stroke="#60a5fa" stroke-width="3" fill="none" opacity="0.8"/>
  <path d="M280,50 Q200,90 120,50 Q200,130 280,90 Q200,170 120,130 Q200,210 280,170 Q200,250 120,210 Q200,290 280,250" stroke="#a78bfa" stroke-width="3" fill="none" opacity="0.8"/>

  <!-- Base pairs (rungs) -->
  <line x1="148" y1="70" x2="252" y2="70" stroke="#34d399" stroke-width="2" opacity="0.6"/>
  <line x1="135" y1="110" x2="265" y2="110" stroke="#fb923c" stroke-width="2" opacity="0.6"/>
  <line x1="148" y1="150" x2="252" y2="150" stroke="#34d399" stroke-width="2" opacity="0.6"/>
  <line x1="135" y1="190" x2="265" y2="190" stroke="#fb923c" stroke-width="2" opacity="0.6"/>
  <line x1="148" y1="230" x2="252" y2="230" stroke="#34d399" stroke-width="2" opacity="0.6"/>

  <!-- Labels on bases -->
  <text x="140" y="74" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="700">A</text>
  <text x="255" y="74" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="700">T</text>
  <text x="128" y="114" fill="#fb923c" font-family="sans-serif" font-size="11" font-weight="700">C</text>
  <text x="268" y="114" fill="#fb923c" font-family="sans-serif" font-size="11" font-weight="700">G</text>
  <text x="140" y="154" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="700">T</text>
  <text x="255" y="154" fill="#34d399" font-family="sans-serif" font-size="11" font-weight="700">A</text>
  <text x="128" y="194" fill="#fb923c" font-family="sans-serif" font-size="11" font-weight="700">G</text>
  <text x="268" y="194" fill="#fb923c" font-family="sans-serif" font-size="11" font-weight="700">C</text>

  <!-- Legend -->
  <rect x="310" y="60" width="12" height="12" rx="2" fill="#60a5fa"/>
  <text x="328" y="71" fill="#94a3b8" font-family="sans-serif" font-size="10">Brin 1</text>
  <rect x="310" y="80" width="12" height="12" rx="2" fill="#a78bfa"/>
  <text x="328" y="91" fill="#94a3b8" font-family="sans-serif" font-size="10">Brin 2</text>
  <rect x="310" y="100" width="12" height="12" rx="2" fill="#34d399"/>
  <text x="328" y="111" fill="#94a3b8" font-family="sans-serif" font-size="10">A-T</text>
  <rect x="310" y="120" width="12" height="12" rx="2" fill="#fb923c"/>
  <text x="328" y="131" fill="#94a3b8" font-family="sans-serif" font-size="10">C-G</text>

  <!-- Bottom note -->
  <text x="200" y="280" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">A va toujours avec T — C va toujours avec G</text>
</svg>
