<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  <text x="200" y="28" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="16" font-weight="700">La cellule animale</text>

  <!-- Membrane -->
  <ellipse cx="200" cy="160" rx="150" ry="110" stroke="#60a5fa" stroke-width="2.5" fill="rgba(96,165,250,0.05)"/>
  <text x="355" y="160" fill="#60a5fa" font-family="sans-serif" font-size="9" font-weight="600">Membrane</text>

  <!-- Noyau -->
  <ellipse cx="200" cy="150" rx="50" ry="45" stroke="#a78bfa" stroke-width="2" fill="rgba(167,139,250,0.1)"/>
  <text x="200" y="148" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="11" font-weight="700">Noyau</text>
  <text x="200" y="162" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="9">(ADN)</text>

  <!-- Mitochondrie -->
  <ellipse cx="110" cy="120" rx="25" ry="12" stroke="#34d399" stroke-width="1.5" fill="rgba(52,211,153,0.1)" transform="rotate(-20 110 120)"/>
  <line x1="95" y1="120" x2="125" y2="120" stroke="#34d399" stroke-width="1" opacity="0.5" transform="rotate(-20 110 120)"/>
  <text x="80" y="100" fill="#34d399" font-family="sans-serif" font-size="9" font-weight="600">Mitochondrie</text>
  <text x="80" y="110" fill="#34d399" font-family="sans-serif" font-size="8">(énergie)</text>

  <!-- Ribosome -->
  <circle cx="280" cy="130" r="5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="290" cy="140" r="5" fill="#fbbf24" opacity="0.7"/>
  <circle cx="275" cy="145" r="5" fill="#fbbf24" opacity="0.7"/>
  <text x="300" y="130" fill="#fbbf24" font-family="sans-serif" font-size="9" font-weight="600">Ribosomes</text>
  <text x="300" y="140" fill="#fbbf24" font-family="sans-serif" font-size="8">(protéines)</text>

  <!-- Reticulum -->
  <path d="M140,200 Q160,185 180,200 Q200,215 220,200 Q240,185 260,200" stroke="#22d3ee" stroke-width="1.5" fill="none" opacity="0.6"/>
  <text x="200" y="225" text-anchor="middle" fill="#22d3ee" font-family="sans-serif" font-size="9" font-weight="600">Réticulum endoplasmique</text>

  <!-- Cytoplasme label -->
  <text x="130" y="190" fill="#475569" font-family="sans-serif" font-size="9">Cytoplasme</text>

  <!-- Bottom note -->
  <text x="200" y="285" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">Noyau = ADN | Mitochondrie = énergie | Ribosome = protéines</text>
</svg>
