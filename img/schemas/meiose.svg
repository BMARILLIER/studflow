<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="16" fill="#0f172a"/>
  <text x="200" y="24" text-anchor="middle" fill="#60a5fa" font-family="sans-serif" font-size="16" font-weight="700">Mitose vs Méiose</text>

  <!-- MITOSE -->
  <text x="110" y="50" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="12" font-weight="700">MITOSE</text>

  <circle cx="110" cy="80" r="18" stroke="#34d399" stroke-width="1.5" fill="rgba(52,211,153,0.08)"/>
  <text x="110" y="84" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="9" font-weight="700">2n</text>
  <text x="145" y="84" fill="#475569" font-family="sans-serif" font-size="12">→</text>

  <circle cx="180" cy="70" r="14" stroke="#34d399" stroke-width="1.5" fill="rgba(52,211,153,0.08)"/>
  <text x="180" y="74" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="8" font-weight="700">2n</text>
  <circle cx="180" cy="95" r="14" stroke="#34d399" stroke-width="1.5" fill="rgba(52,211,153,0.08)"/>
  <text x="180" y="99" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="8" font-weight="700">2n</text>

  <text x="110" y="125" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="8">1 division</text>
  <text x="110" y="137" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="8">2 cellules IDENTIQUES</text>
  <text x="110" y="149" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="8" font-weight="600">= croissance</text>

  <!-- MEIOSE -->
  <text x="300" y="50" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="12" font-weight="700">MÉIOSE</text>

  <circle cx="270" cy="80" r="18" stroke="#a78bfa" stroke-width="1.5" fill="rgba(167,139,250,0.08)"/>
  <text x="270" y="84" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="9" font-weight="700">2n</text>
  <text x="300" y="84" fill="#475569" font-family="sans-serif" font-size="12">→</text>

  <circle cx="330" cy="68" r="10" stroke="#a78bfa" stroke-width="1" fill="rgba(167,139,250,0.08)"/>
  <text x="330" y="72" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="7" font-weight="700">n</text>
  <circle cx="350" cy="68" r="10" stroke="#a78bfa" stroke-width="1" fill="rgba(167,139,250,0.08)"/>
  <text x="350" y="72" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="7" font-weight="700">n</text>
  <circle cx="330" cy="95" r="10" stroke="#a78bfa" stroke-width="1" fill="rgba(167,139,250,0.08)"/>
  <text x="330" y="99" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="7" font-weight="700">n</text>
  <circle cx="350" cy="95" r="10" stroke="#a78bfa" stroke-width="1" fill="rgba(167,139,250,0.08)"/>
  <text x="350" y="99" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="7" font-weight="700">n</text>

  <text x="310" y="125" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="8">2 divisions</text>
  <text x="310" y="137" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="8">4 cellules DIFFÉRENTES</text>
  <text x="310" y="149" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="8" font-weight="600">= gamètes</text>

  <!-- Comparison table -->
  <rect x="30" y="170" width="340" height="110" rx="10" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="120" y="188" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="10" font-weight="700">Mitose</text>
  <text x="280" y="188" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="10" font-weight="700">Méiose</text>

  <line x1="200" y1="175" x2="200" y2="275" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="35" y1="195" x2="365" y2="195" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="120" y="210" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">1 division</text>
  <text x="280" y="210" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">2 divisions</text>

  <text x="120" y="228" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">2 cellules 2n</text>
  <text x="280" y="228" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">4 cellules n</text>

  <text x="120" y="246" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">IDENTIQUES</text>
  <text x="280" y="246" text-anchor="middle" fill="#94a3b8" font-family="sans-serif" font-size="9">DIFFÉRENTES</text>

  <text x="120" y="264" text-anchor="middle" fill="#34d399" font-family="sans-serif" font-size="9" font-weight="600">Partout</text>
  <text x="280" y="264" text-anchor="middle" fill="#a78bfa" font-family="sans-serif" font-size="9" font-weight="600">Ovaires/Testicules</text>

  <text x="200" y="294" text-anchor="middle" fill="#64748b" font-family="sans-serif" font-size="10">MI = Même Information | ME = MÉlange</text>
</svg>
